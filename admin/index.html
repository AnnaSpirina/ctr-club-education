<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTR CLUB Обучение — Админ-панель</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111216; --bg2:#15161B; --panel:#1A1B21; --panel2:#202128; --elev:#26272F;
  --line:#2A2B34; --line2:#363842;
  --txt:#E9EAEE; --txt2:#A6A8B2; --muted:#74767F;
  --red:#E2231A; --red-d:#B81C15; --red-soft:rgba(226,35,26,.13);
  --green:#2BA45A; --green-soft:rgba(43,164,90,.14);
  --amber:#E0A21A; --amber-soft:rgba(224,162,26,.14);
  --blue:#5B8CFF; --blue-soft:rgba(91,140,255,.14);
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --m:'JetBrains Mono',ui-monospace,monospace;
  --r:12px; --r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--txt);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--txt);background:var(--bg);border:1px solid var(--line2);border-radius:var(--r-sm);font-size:14px}
input,select{height:42px;padding:0 14px}
textarea{padding:12px 14px;resize:vertical;line-height:1.6;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
input::placeholder,textarea::placeholder{color:var(--muted)}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;border:3px solid var(--bg)}
.mono{font-family:var(--m)}
.eyebrow{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--muted)}

/* ========== LAYOUT ========== */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

/* sidebar */
.side{background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:22px 20px 18px;border-bottom:1px solid var(--line)}
.side-brand{display:flex;align-items:center;gap:10px}
.side-brand img{height:22px}
.side-brand .role{font-family:var(--m);font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--red);border:1px solid var(--line2);border-radius:5px;padding:3px 6px}
.side-nav{padding:14px 12px;flex:1;overflow-y:auto}
.side-lbl{font-family:var(--m);font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;color:var(--txt2);font-weight:500;font-size:14px;transition:.13s;margin-bottom:1px;cursor:pointer}
.nav-i svg{width:18px;height:18px;flex-shrink:0;color:var(--muted);transition:.13s}
.nav-i:hover{background:var(--panel);color:var(--txt)}
.nav-i:hover svg{color:var(--txt2)}
.nav-i.active{background:var(--red-soft);color:#fff}
.nav-i.active svg{color:var(--red)}
.nav-i .cnt{margin-left:auto;font-family:var(--m);font-size:11px;color:var(--muted)}
.nav-i.active .cnt{color:var(--red)}
.side-bot{padding:14px;border-top:1px solid var(--line)}
.usr{display:flex;align-items:center;gap:11px;padding:8px;border-radius:9px}
.usr .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--red),#7a1410);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.usr .nm{font-size:13px;font-weight:600}
.usr .rl{font-size:11px;color:var(--muted)}

/* main */
.main{min-width:0;display:flex;flex-direction:column}
.topbar{height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 28px;background:rgba(17,18,22,.8);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
.tb-search{flex:1;max-width:380px;position:relative}
.tb-search input{width:100%;height:38px;padding-left:40px;background:var(--panel);border-color:var(--line)}
.tb-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.14s;white-space:nowrap}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-d)}
.btn-ghost{border:1px solid var(--line2);color:var(--txt)}
.btn-ghost:hover{border-color:var(--muted);background:var(--panel)}
.btn-sm{height:34px;padding:0 13px;font-size:13px;border-radius:8px}
.icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.icon-btn:hover{background:var(--panel);color:var(--txt)}

.content{padding:28px;flex:1}

/* ========== DASHBOARD ========== */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.stat .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.stat .ic.red{background:var(--red-soft);color:var(--red)}
.stat .ic.green{background:var(--green-soft);color:var(--green)}
.stat .ic.amber{background:var(--amber-soft);color:var(--amber)}
.stat .ic.blue{background:var(--blue-soft);color:var(--blue)}
.stat .delta{font-family:var(--m);font-size:11px;font-weight:600}
.stat .delta.up{color:var(--green)}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat .lbl{font-size:13px;color:var(--txt2);margin-top:6px}

.panel-row{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:26px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.box-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.box-h h3{font-size:15px;font-weight:700}
.box-h a{font-size:12.5px;color:var(--red);font-weight:600}
.box-b{padding:8px 0}
.mini-row{display:flex;align-items:center;gap:14px;padding:12px 20px;transition:.12s;cursor:pointer}
.mini-row:hover{background:var(--panel2)}
.mini-cov{width:46px;height:32px;border-radius:6px;background:#0c0d10;position:relative;flex-shrink:0;overflow:hidden;border:1px solid var(--line)}
.mini-cov::before{content:"";position:absolute;inset:0;background:radial-gradient(120% 120% at 100% 0%,rgba(226,35,26,.45),transparent 60%)}
.mini-main{flex:1;min-width:0}
.mini-main .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-main .m{font-family:var(--m);font-size:11px;color:var(--muted);margin-top:2px}

.seo-q{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.seo-q:last-child{border-bottom:none}
.seo-q .pos{width:30px;height:30px;border-radius:8px;background:var(--green-soft);color:var(--green);font-family:var(--m);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seo-q .pos.mid{background:var(--amber-soft);color:var(--amber)}
.seo-q .q{flex:1;font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seo-q .v{font-family:var(--m);font-size:11px;color:var(--muted)}

.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--m);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:6px}
.pill.pub{background:var(--green-soft);color:var(--green)}
.pill.draft{background:var(--amber-soft);color:var(--amber)}
.pill.review{background:var(--blue-soft);color:var(--blue)}
.pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}

.fmt-badge{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:var(--elev);color:var(--txt2)}

/* quick create */
.qc{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.qc-i{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;transition:.14s;text-align:left}
.qc-i:hover{border-color:var(--red);background:var(--panel2)}
.qc-i .ic{width:38px;height:38px;border-radius:10px;background:var(--elev);color:var(--red);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.qc-i h4{font-size:14px;font-weight:700}
.qc-i p{font-size:11.5px;color:var(--muted);margin-top:3px}

/* ========== CONTENT LIST ========== */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px}
.tab{padding:11px 16px;font-size:13.5px;font-weight:600;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:.13s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--txt)}
.tab.active{color:#fff;border-bottom-color:var(--red)}
.tab .cnt{font-family:var(--m);font-size:11px;background:var(--elev);padding:1px 7px;border-radius:20px;color:var(--txt2)}
.tab.active .cnt{background:var(--red-soft);color:var(--red)}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toolbar .sel{height:38px;background:var(--panel);border-color:var(--line);min-width:150px}
.toolbar .spacer{flex:1}

.tbl{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
.tbl-h,.tbl-r{display:grid;grid-template-columns:2.6fr 1fr 1fr 1.1fr .9fr 80px 44px;gap:14px;align-items:center;padding:13px 20px}
.tbl-h{border-bottom:1px solid var(--line);font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.tbl-r{border-bottom:1px solid var(--line);transition:.12s;cursor:pointer}
.tbl-r:last-child{border-bottom:none}
.tbl-r:hover{background:var(--panel2)}
.tr-title{display:flex;align-items:center;gap:13px;min-width:0}
.tr-title .cov{width:54px;height:36px;border-radius:7px;background:#0c0d10;position:relative;flex-shrink:0;overflow:hidden;border:1px solid var(--line)}
.tr-title .cov::before{content:"";position:absolute;inset:0;background:radial-gradient(130% 130% at 100% 0%,rgba(226,35,26,.45),transparent 58%)}
.tr-title .cov .g{position:absolute;right:4px;bottom:1px;font-family:var(--m);font-weight:700;font-size:15px;color:rgba(255,255,255,.13)}
.tr-title .tt{min-width:0}
.tr-title .tt .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-title .tt .sl{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-cell{font-size:13px;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-cell.mono{font-family:var(--m);font-size:11.5px;color:var(--muted)}
.seo-mini{display:flex;align-items:center;gap:8px}
.seo-mini .ring{width:30px;height:30px;flex-shrink:0}
.seo-mini .sc{font-family:var(--m);font-size:12px;font-weight:700}
.row-act{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.row-act:hover{background:var(--elev);color:var(--txt)}

/* ========== EDITOR ========== */
.ed-head{position:sticky;top:64px;z-index:20;background:rgba(17,18,22,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px}
.ed-head .back{width:36px;height:36px;border-radius:9px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;color:var(--txt2)}
.ed-head .back:hover{background:var(--panel);color:var(--txt)}
.ed-head .ti{min-width:0}
.ed-head .ti .nm{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}
.ed-head .ti .mt{font-family:var(--m);font-size:11px;color:var(--muted);margin-top:1px}
.ed-head .acts{margin-left:auto;display:flex;align-items:center;gap:10px}
.saved{font-family:var(--m);font-size:11px;color:var(--green);display:flex;align-items:center;gap:6px}

.ed-tabs{padding:0 28px;border-bottom:1px solid var(--line);display:flex;gap:2px;background:var(--bg)}
.ed-tab{padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ed-tab:hover{color:var(--txt)}
.ed-tab.active{color:#fff;border-bottom-color:var(--red)}
.ed-tab .warn{width:7px;height:7px;border-radius:50%;background:var(--amber)}

.ed-body{display:grid;grid-template-columns:1fr 312px;gap:28px;padding:26px 28px;align-items:start}
@media(max-width:1180px){.ed-body{grid-template-columns:1fr}}
.ed-main{min-width:0;display:flex;flex-direction:column;gap:22px}

.fcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px}
.fcard>h3{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:9px}
.fcard>.hint{font-size:12.5px;color:var(--muted);margin-bottom:18px}
.field{margin-bottom:18px}
.field:last-child{margin-bottom:0}
.field>label{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:8px}
.field>label .req{color:var(--red)}
.field>label .ct{font-family:var(--m);font-size:11px;color:var(--muted);font-weight:500}
.field .sub{font-size:11.5px;color:var(--muted);margin-top:6px}
.field input,.field textarea,.field select{width:100%}
.ai-btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--m);font-size:11px;font-weight:600;color:var(--red);border:1px solid var(--line2);border-radius:6px;padding:3px 8px;transition:.13s}
.ai-btn:hover{background:var(--red-soft);border-color:var(--red)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.row2{grid-template-columns:1fr}}

.slug-wrap{display:flex;align-items:center;border:1px solid var(--line2);border-radius:var(--r-sm);overflow:hidden;background:var(--bg)}
.slug-wrap .pre{padding:0 0 0 14px;font-family:var(--m);font-size:13px;color:var(--muted);white-space:nowrap}
.slug-wrap input{border:none;box-shadow:none;background:transparent;padding-left:2px;font-family:var(--m)}

/* cover uploader */
.cover-up{display:flex;gap:16px;align-items:center}
.cover-prev{width:170px;height:96px;border-radius:10px;background:#0c0d10;position:relative;overflow:hidden;border:1px solid var(--line2);flex-shrink:0}
.cover-prev::before{content:"";position:absolute;inset:0;background:radial-gradient(130% 130% at 100% 0%,rgba(226,35,26,.5),transparent 58%),linear-gradient(120deg,#1a1b21,#26272f)}
.cover-prev .g{position:absolute;right:10px;top:6px;font-family:var(--m);font-weight:700;font-size:40px;color:rgba(255,255,255,.08)}
.cover-prev .tag{position:absolute;left:10px;bottom:9px;font-family:var(--m);font-size:9px;font-weight:700;text-transform:uppercase;background:var(--red);color:#fff;padding:3px 7px;border-radius:5px}
.cover-up .upinfo .b{font-size:13px;font-weight:600}
.cover-up .upinfo .s{font-size:11.5px;color:var(--muted);margin:4px 0 10px}

/* repeatable blocks */
.blk{border:1px solid var(--line2);border-radius:10px;padding:15px;margin-bottom:12px;background:var(--bg)}
.blk-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.blk-h .num{width:24px;height:24px;border-radius:6px;background:var(--elev);color:var(--txt2);font-family:var(--m);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.blk-h .drag{color:var(--muted);cursor:grab}
.blk-h .lbl{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.blk-h .rm{margin-left:auto;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.blk-h .rm:hover{background:var(--red-soft);color:var(--red)}
.blk .mini-in{margin-bottom:10px}
.blk .mini-in:last-child{margin-bottom:0}
.add-blk{width:100%;border:1px dashed var(--line2);border-radius:10px;padding:12px;color:var(--txt2);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.13s}
.add-blk:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}

/* lesson program row */
.lesson-r{display:flex;align-items:center;gap:12px;border:1px solid var(--line2);border-radius:10px;padding:11px 14px;margin-bottom:10px;background:var(--bg)}
.lesson-r .drag{color:var(--muted);cursor:grab}
.lesson-r .num{font-family:var(--m);font-size:12px;font-weight:700;color:var(--muted);width:22px}
.lesson-r input.lt{flex:1;height:36px;border-color:var(--line)}
.lesson-r input.ld{width:90px;height:36px;border-color:var(--line);font-family:var(--m);font-size:12px;text-align:center}
.lesson-r .vid{font-family:var(--m);font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;white-space:nowrap}
.lesson-r .rm{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.lesson-r .rm:hover{background:var(--red-soft);color:var(--red)}

/* chips / tags input */
.tagbox{border:1px solid var(--line2);border-radius:var(--r-sm);padding:10px;background:var(--bg);display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:46px}
.tagbox.focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
.tagc{display:inline-flex;align-items:center;gap:7px;background:var(--elev);border:1px solid var(--line2);border-radius:7px;padding:5px 8px 5px 11px;font-size:13px}
.tagc .x{color:var(--muted);cursor:pointer;display:flex}
.tagc .x:hover{color:var(--red)}
.tagbox input{border:none;box-shadow:none!important;background:transparent;flex:1;min-width:160px;height:30px;padding:0 4px}
.tagbox input:focus{outline:none}

/* outcomes/list chips */
.ck-list .ck{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ck-list .ck .ico{color:var(--red);flex-shrink:0}
.ck-list .ck input{flex:1;height:38px;border-color:var(--line)}
.ck-list .ck .rm{color:var(--muted);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ck-list .ck .rm:hover{background:var(--red-soft);color:var(--red)}

/* SEO serp preview */
.serp{border:1px solid var(--line2);border-radius:10px;padding:16px 18px;background:#0e0f13}
.serp .url{font-family:var(--m);font-size:12px;color:#5fae6d;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.serp .ttl{font-size:18px;color:#7aa7ff;font-weight:500;line-height:1.3;margin-bottom:5px}
.serp .desc{font-size:13px;color:#b8bac2;line-height:1.5}
.serp .desc .hl{color:#fff;font-weight:600}

/* SEO checklist */
.seo-check{display:flex;flex-direction:column;gap:1px}
.seo-check .c{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13px;border-bottom:1px solid var(--line);color:var(--txt2)}
.seo-check .c:last-child{border-bottom:none}
.seo-check .c .b{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seo-check .c.ok .b{background:var(--green-soft);color:var(--green)}
.seo-check .c.no .b{background:var(--amber-soft);color:var(--amber)}
.seo-check .c.ok{color:var(--txt)}

.schema-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line2);border-radius:10px;padding:13px 15px;background:var(--bg)}
.schema-card .ic{width:36px;height:36px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.schema-card .nm{font-size:13.5px;font-weight:600}
.schema-card .ds{font-size:11.5px;color:var(--muted)}
.schema-card .badge{margin-left:auto;font-family:var(--m);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green);background:var(--green-soft);padding:3px 8px;border-radius:5px}

/* related picker */
.rel-pick{display:flex;align-items:center;gap:12px;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;margin-bottom:9px;background:var(--bg)}
.rel-pick .cov{width:48px;height:32px;border-radius:6px;background:#0c0d10;position:relative;overflow:hidden;flex-shrink:0;border:1px solid var(--line)}
.rel-pick .cov::before{content:"";position:absolute;inset:0;background:radial-gradient(130% 130% at 100% 0%,rgba(226,35,26,.4),transparent 60%)}
.rel-pick .t{flex:1;font-size:13px;font-weight:600;min-width:0}
.rel-pick .m{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px}
.rel-pick .rm{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.rel-pick .rm:hover{background:var(--red-soft);color:var(--red)}

/* editor right rail */
.ed-rail{position:sticky;top:182px;display:flex;flex-direction:column;gap:16px}
.rc{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px}
.rc h4{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.status-sel{display:flex;flex-direction:column;gap:7px}
.status-opt{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line2);border-radius:9px;cursor:pointer;transition:.12s}
.status-opt:hover{border-color:var(--muted)}
.status-opt.sel{border-color:var(--red);background:var(--red-soft)}
.status-opt .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-opt .dot.draft{background:var(--amber)}
.status-opt .dot.review{background:var(--blue)}
.status-opt .dot.pub{background:var(--green)}
.status-opt .t{font-size:13px;font-weight:600}
.status-opt .d{font-size:11px;color:var(--muted)}
.status-opt .ck{margin-left:auto;color:var(--red);opacity:0}
.status-opt.sel .ck{opacity:1}

.gauge-wrap{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.gauge{width:72px;height:72px;flex-shrink:0;position:relative}
.gauge .v{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.gauge .v b{font-size:20px;font-weight:800;line-height:1}
.gauge .v span{font-size:9px;color:var(--muted);font-family:var(--m)}
.gscore-txt .lvl{font-size:14px;font-weight:700}
.gscore-txt .ds{font-size:11.5px;color:var(--muted);margin-top:2px}

.facts .f{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
.facts .f:first-child{border-top:none}
.facts .f .k{color:var(--muted)}
.facts .f .v{font-weight:600;font-family:var(--m);font-size:11.5px}

/* ========== AUTHORS ========== */
.auth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.acard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px}
.acard .top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.acard .av{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#34353d,#1a1b21);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;border:1px solid var(--line2)}
.acard .nm{font-size:15px;font-weight:700}
.acard .rl{font-size:12.5px;color:var(--red)}
.acard .bio{font-size:12.5px;color:var(--txt2);line-height:1.5;margin-bottom:14px}
.acard .ft{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--line)}
.acard .ft .c{font-family:var(--m);font-size:11.5px;color:var(--muted)}

/* ========== MEDIA ========== */
.media-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.mtile{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.14s}
.mtile:hover{border-color:var(--line2)}
.mtile .th{aspect-ratio:16/10;background:#0c0d10;position:relative;overflow:hidden}
.mtile .th::before{content:"";position:absolute;inset:0;background:radial-gradient(130% 130% at 100% 0%,rgba(226,35,26,.4),transparent 60%),linear-gradient(120deg,#1a1b21,#26272f)}
.mtile .th .ty{position:absolute;left:8px;top:8px;font-family:var(--m);font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:5px;color:#fff}
.mtile .th .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7)}
.mtile .mi{padding:10px 12px}
.mtile .mi .n{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mtile .mi .s{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px}
.up-tile{border:1px dashed var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--txt2);font-weight:600;font-size:13px;min-height:150px;border-radius:10px;transition:.14s;cursor:pointer}
.up-tile:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}

/* settings */
.set-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line2);border-radius:10px;margin-bottom:10px;background:var(--bg)}
.set-row .drag{color:var(--muted);cursor:grab}
.set-row .nm{flex:1;font-weight:600;font-size:13.5px}
.set-row .cnt{font-family:var(--m);font-size:11.5px;color:var(--muted)}
.set-row .rm{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.set-row .rm:hover{background:var(--red-soft);color:var(--red)}

.page-head{margin-bottom:22px}
.page-head h2{font-size:22px;font-weight:800;letter-spacing:-.02em}
.page-head p{font-size:13.5px;color:var(--txt2);margin-top:4px}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(8,8,11,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:var(--panel);border:1px solid var(--line2);border-radius:16px;width:100%;max-width:680px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.modal h3{font-size:19px;font-weight:800;letter-spacing:-.01em}
.modal .ms{font-size:13.5px;color:var(--txt2);margin:5px 0 22px}
.fmt-pick{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.fmt-pick .fp{border:1px solid var(--line2);border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;transition:.14s}
.fmt-pick .fp:hover{border-color:var(--red);background:var(--red-soft)}
.fmt-pick .fp .ic{width:42px;height:42px;border-radius:11px;background:var(--elev);color:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto 11px}
.fmt-pick .fp h4{font-size:13.5px;font-weight:700}
.fmt-pick .fp p{font-size:10.5px;color:var(--muted);margin-top:3px}
.modal-x{position:absolute;top:18px;right:18px}

@media(max-width:1000px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
  .panel-row{grid-template-columns:1fr}
  .qc,.fmt-pick{grid-template-columns:1fr 1fr}
  .auth-grid,.media-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

function svg(p,s){return `<svg width="${s||18}" height="${s||18}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`}

function statusPill(s){const map={published:['pub','Опубликовано'],draft:['draft','Черновик'],review:['review','На проверке']};const[c,t]=map[s];return `<span class="pill ${c}"><span class="d"></span>${t}</span>`}
function ringSVG(score,size){
  const r=(size-4)/2, c=2*Math.PI*r, off=c*(1-score/100);
  const col=score>=80?'var(--green)':score>=60?'var(--amber)':'var(--red)';
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line2)" stroke-width="3"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="3" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})"/></svg>`;
}

function translit(s){const map={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'e',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'c',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',' ':'-'};return (s||'').toLowerCase().split('').map(c=>map[c]!==undefined?map[c]:/[a-z0-9-]/.test(c)?c:'').join('').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,50)}

function renderKw(){const c=document.getElementById('kwChips');if(!c)return;c.innerHTML=S.ek.map((k,i)=>`<span class="tagc">${k} <span class="x" onclick="rmKw(${i})">${svg(I.x,12)}</span></span>`).join('')}
function addKw(v){v=(v||'').trim();if(v&&!S.ek.includes(v)){S.ek.push(v);renderKw()}}
function rmKw(i){S.ek.splice(i,1);renderKw()}

/* AI mock fills */
function aiFill(btn,kind){btn.disabled=true;const old=btn.innerHTML;btn.innerHTML=svg(I.ai,12)+' Генерирую…';setTimeout(()=>{const ta=btn.closest('.field').querySelector('textarea');const samples={excerpt:'Диагностика гула, выпрессовка и запрессовка без перекоса, момент затяжки ступичной гайки — полный цикл замены на реальном автомобиле.',intro:'Гул ступичного подшипника — частая причина обращения и повторного визита, если работа сделана неаккуратно. В курсе эксперт CTR разбирает полный цикл: от диагностики до контроля момента затяжки.',short:'Гул подшипника усиливается при загрузке колеса и не зависит от покрытия, шум резины — наоборот. Лёгкие змейки на ровной дороге покажут проблемную сторону.'};if(ta){ta.value=samples[kind]||'';ta.dispatchEvent(new Event('input'))}btn.disabled=false;btn.innerHTML=old},700)}
function aiMeta(){const d=document.getElementById('mdIn');d.value='Как заменить ступичный подшипник: диагностика гула, выпрессовка и запрессовка без перекоса, момент затяжки ступичной гайки. Видеокурс эксперта CTR.';seoLive()}
function aiKw(){['замена ступичного подшипника','гудит ступичный подшипник','момент затяжки ступичной гайки','диагностика ступицы'].forEach(addKw)}

      ${rows.map(([q,p,sh,dyn])=>`<div class="tbl-r" style="grid-template-columns:2.5fr 1fr 1fr 1fr 1.2fr;cursor:default">

/* ===================== CREATE MODAL ===================== */
function openCreate(){
  const m=document.createElement('div');m.className='modal-bg';m.id='modal';m.onclick=e=>{if(e.target===m)closeModal()};
  m.innerHTML=`<div class="modal" style="position:relative"><button class="modal-x icon-btn" style="border-color:var(--line)" onclick="closeModal()">${svg(I.x,16)}</button>
    <h3>Новый материал</h3><div class="ms">Выберите формат — дальше откроется редактор с нужными полями.</div>
    <div class="fmt-pick">${FORDER.map(f=>`<div class="fp" onclick="closeModal();go('editor',null,'${f}')"><div class="ic">${svg(FORMATS[f].icon,20)}</div><h4>${FORMATS[f].label}</h4><p>${f==='lesson'?'Вопрос-ответ':f==='course'?'Из уроков':'Один блок'}</p></div>`).join('')}</div>
  </div>`;
  document.body.appendChild(m);
}
function closeModal(){const m=document.getElementById('modal');if(m)m.remove()}

/* ===================== RENDER ===================== */
function render(){
  S._blank=S.view==='editor'&&!S.edit?S._blank:null;
  renderNav();
  let h='';
  switch(S.view){
    case 'dashboard':h=vDashboard();break;
    case 'list':h=vList();break;
    case 'editor':h=vEditor();break;
    case 'authors':h=vAuthors();break;
    case 'media':h=vMedia();break;
    case 'seo':h=vSeo();break;
    case 'settings':h=vSettings();break;
    default:h=vDashboard();
  }
  document.getElementById('app').innerHTML=h;
  if(S.view==='editor'&&S.etab==='seo')renderKw();
}
render();
</script>
