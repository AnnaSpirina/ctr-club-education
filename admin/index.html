<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTR CLUB Обучение — Админ-панель</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F5F6; --panel:#FFFFFF; --soft:#F6F6F7; --soft-2:#F0F1F2;
  --line:#EAEAEC; --line-2:#E1E1E4;
  --ink:#1C1D21; --body:#3C3D43; --muted:#8A8C94; --faint:#A9AAB2;
  --red:#E2231A; --red-d:#B81C15; --red-soft:#FCEBEA;
  --green:#128A3E; --green-soft:#E6F4EB;
  --amber:#B7810B; --amber-soft:#FBF2DD;
  --blue:#2563EB; --blue-soft:#E8EFFE;
  --cover:#1C1D21;
  --f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --m:'JetBrains Mono',ui-monospace,monospace;
  --r:12px; --r-sm:9px;
  --shadow:0 1px 2px rgba(20,20,25,.04),0 6px 20px -14px rgba(20,20,25,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--body);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:var(--ink);background:#fff;border:1px solid var(--line-2);border-radius:var(--r-sm);font-size:14px}
input,select{height:42px;padding:0 14px}
textarea{padding:12px 14px;resize:vertical;line-height:1.6;width:100%}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
input::placeholder,textarea::placeholder{color:var(--faint)}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:#d9dadd;border-radius:6px;border:3px solid var(--bg)}
.mono{font-family:var(--m)}
.eyebrow{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--muted)}
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:22px 20px 18px;border-bottom:1px solid var(--line)}
.side-brand{display:flex;align-items:center;gap:10px}
.side-brand img{height:22px}
.side-brand .role{font-family:var(--m);font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--red);border:1px solid var(--line-2);border-radius:5px;padding:3px 6px}
.side-nav{padding:14px 12px;flex:1;overflow-y:auto}
.side-lbl{font-family:var(--m);font-size:9.5px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:8px 10px 6px}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:9px;color:var(--body);font-weight:500;font-size:14px;transition:.13s;margin-bottom:1px;cursor:pointer}
.nav-i svg{width:18px;height:18px;flex-shrink:0;color:var(--muted);transition:.13s}
.nav-i:hover{background:var(--soft)}
.nav-i:hover svg{color:var(--body)}
.nav-i.active{background:var(--red-soft);color:var(--red)}
.nav-i.active svg{color:var(--red)}
.nav-i .cnt{margin-left:auto;font-family:var(--m);font-size:11px;color:var(--faint)}
.nav-i.active .cnt{color:var(--red)}
.side-bot{padding:14px;border-top:1px solid var(--line)}
.usr{display:flex;align-items:center;gap:11px;padding:8px;border-radius:9px}
.usr .av{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e9eaed}
.usr .av svg{width:100%;height:100%;display:block}
.usr .nm{font-size:13px;font-weight:600;color:var(--ink)}
.usr .rl{font-size:11px;color:var(--muted)}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{height:64px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 28px;background:rgba(255,255,255,.85);backdrop-filter:blur(8px);position:sticky;top:0;z-index:30}
.topbar h1{font-size:17px;font-weight:700;letter-spacing:-.01em;color:var(--ink)}
.tb-search{flex:1;max-width:380px;position:relative}
.tb-search input{width:100%;height:38px;padding-left:40px;background:var(--soft);border-color:var(--line)}
.tb-search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.btn{display:inline-flex;align-items:center;gap:8px;height:38px;padding:0 16px;border-radius:9px;font-weight:600;font-size:13.5px;transition:.14s;white-space:nowrap}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:hover{background:var(--red-d)}
.btn-ghost{border:1px solid var(--line-2);color:var(--ink);background:#fff}
.btn-ghost:hover{border-color:var(--muted);background:var(--soft)}
.btn-sm{height:34px;padding:0 13px;font-size:13px;border-radius:8px}
.icon-btn{width:38px;height:38px;border-radius:9px;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--muted);background:#fff}
.icon-btn:hover{background:var(--soft);color:var(--ink)}
.content{padding:28px;flex:1}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.stat .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.stat .ic.red{background:var(--red-soft);color:var(--red)}
.stat .ic.green{background:var(--green-soft);color:var(--green)}
.stat .ic.amber{background:var(--amber-soft);color:var(--amber)}
.stat .ic.blue{background:var(--blue-soft);color:var(--blue)}
.stat .delta{font-family:var(--m);font-size:11px;font-weight:600}
.stat .delta.up{color:var(--green)}
.stat .num{font-size:30px;font-weight:800;letter-spacing:-.02em;line-height:1;color:var(--ink)}
.stat .lbl{font-size:13px;color:var(--muted);margin-top:6px}
.panel-row{display:grid;grid-template-columns:1.7fr 1fr;gap:16px;margin-bottom:26px}
.box{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.box-h{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.box-h h3{font-size:15px;font-weight:700;color:var(--ink)}
.box-h a{font-size:12.5px;color:var(--red);font-weight:600;cursor:pointer}
.box-b{padding:8px 0}
.mini-row{display:flex;align-items:center;gap:14px;padding:12px 20px;transition:.12s;cursor:pointer}
.mini-row:hover{background:var(--soft)}
.mini-cov{width:52px;height:33px;border-radius:6px;overflow:hidden;flex-shrink:0;position:relative;background:var(--cover);border:1px solid var(--line)}
.mini-cov svg{position:absolute;inset:0;width:100%;height:100%}
.mini-main{flex:1;min-width:0}
.mini-main .t{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.mini-main .m{font-family:var(--m);font-size:11px;color:var(--muted);margin-top:2px}
.seo-q{padding:13px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
.seo-q:last-child{border-bottom:none}
.seo-q .pos{width:30px;height:30px;border-radius:8px;background:var(--green-soft);color:var(--green);font-family:var(--m);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seo-q .pos.mid{background:var(--amber-soft);color:var(--amber)}
.seo-q .q{flex:1;font-size:13px;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.seo-q .v{font-family:var(--m);font-size:11px;color:var(--muted)}
.pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--m);font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:6px}
.pill.pub{background:var(--green-soft);color:var(--green)}
.pill.draft{background:var(--amber-soft);color:var(--amber)}
.pill.review{background:var(--blue-soft);color:var(--blue)}
.pill .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.fmt-badge{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:var(--soft-2);color:var(--body)}
.qc{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.qc-i{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;cursor:pointer;transition:.14s;text-align:left;box-shadow:var(--shadow)}
.qc-i:hover{border-color:var(--red);background:#fff;transform:translateY(-2px)}
.qc-i .ic{width:38px;height:38px;border-radius:10px;background:var(--soft-2);color:var(--red);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.qc-i h4{font-size:14px;font-weight:700;color:var(--ink)}
.qc-i p{font-size:11.5px;color:var(--muted);margin-top:3px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}
.tab{padding:11px 16px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:.13s;display:flex;align-items:center;gap:8px}
.tab:hover{color:var(--ink)}
.tab.active{color:var(--ink);border-bottom-color:var(--red)}
.tab .cnt{font-family:var(--m);font-size:11px;background:var(--soft-2);padding:1px 7px;border-radius:20px;color:var(--muted)}
.tab.active .cnt{background:var(--red-soft);color:var(--red)}
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.toolbar .sel{height:38px;background:#fff;border-color:var(--line-2);min-width:150px}
.toolbar .spacer{flex:1}
.tbl{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.tbl-h,.tbl-r{display:grid;grid-template-columns:2.8fr 1fr 1.3fr .9fr 80px 44px;gap:14px;align-items:center;padding:13px 20px}
.tbl-h{border-bottom:1px solid var(--line);font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.tbl-r{border-bottom:1px solid var(--line);transition:.12s;cursor:pointer}
.tbl-r:last-child{border-bottom:none}
.tbl-r:hover{background:var(--soft)}
.tr-title{display:flex;align-items:center;gap:13px;min-width:0}
.tr-title .cov{width:58px;height:37px;border-radius:7px;overflow:hidden;flex-shrink:0;position:relative;background:var(--cover);border:1px solid var(--line)}
.tr-title .cov svg{position:absolute;inset:0;width:100%;height:100%}
.tr-title .tt{min-width:0}
.tr-title .tt .nm{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.tr-title .tt .sl{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-cell{font-size:13px;color:var(--body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-author{display:flex;align-items:center;gap:9px;min-width:0}
.tr-author .a{width:26px;height:26px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e9eaed}
.tr-author .a svg{width:100%;height:100%;display:block}
.tr-author span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seo-mini{display:flex;align-items:center;gap:8px}
.seo-mini .ring{width:30px;height:30px;flex-shrink:0}
.seo-mini .sc{font-family:var(--m);font-size:12px;font-weight:700}
.row-act{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.row-act:hover{background:var(--soft-2);color:var(--ink)}
.ed-head{position:sticky;top:64px;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px 28px;display:flex;align-items:center;gap:16px}
.ed-head .back{width:36px;height:36px;border-radius:9px;border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:var(--muted);background:#fff}
.ed-head .back:hover{background:var(--soft);color:var(--ink)}
.ed-head .ti{min-width:0}
.ed-head .ti .nm{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px;color:var(--ink)}
.ed-head .ti .mt{font-family:var(--m);font-size:11px;color:var(--muted);margin-top:1px}
.ed-head .acts{margin-left:auto;display:flex;align-items:center;gap:10px}
.saved{font-family:var(--m);font-size:11px;color:var(--green);display:flex;align-items:center;gap:6px}
.ed-tabs{padding:0 28px;border-bottom:1px solid var(--line);display:flex;gap:2px;background:var(--bg)}
.ed-tab{padding:13px 16px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;display:flex;align-items:center;gap:8px}
.ed-tab:hover{color:var(--ink)}
.ed-tab.active{color:var(--ink);border-bottom-color:var(--red)}
.ed-tab .warn{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.ed-body{display:grid;grid-template-columns:1fr 312px;gap:28px;padding:26px 28px;align-items:start}
@media(max-width:1180px){.ed-body{grid-template-columns:1fr}}
.ed-main{min-width:0;display:flex;flex-direction:column;gap:22px}
.fcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:22px;box-shadow:var(--shadow)}
.fcard>h3{font-size:15px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:9px;color:var(--ink)}
.fcard>.hint{font-size:12.5px;color:var(--muted);margin-bottom:18px}
.field{margin-bottom:18px}
.field:last-child{margin-bottom:0}
.field>label{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:8px;color:var(--ink)}
.field>label .req{color:var(--red)}
.field>label .ct{font-family:var(--m);font-size:11px;color:var(--muted);font-weight:500}
.field .sub{font-size:11.5px;color:var(--muted);margin-top:6px}
.field input,.field textarea,.field select{width:100%}
.ai-btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--m);font-size:11px;font-weight:600;color:var(--red);border:1px solid var(--line-2);border-radius:6px;padding:3px 8px;transition:.13s;background:#fff}
.ai-btn:hover{background:var(--red-soft);border-color:var(--red)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.row2{grid-template-columns:1fr}}
.slug-wrap{display:flex;align-items:center;border:1px solid var(--line-2);border-radius:var(--r-sm);overflow:hidden;background:#fff}
.slug-wrap .pre{padding:0 0 0 14px;font-family:var(--m);font-size:13px;color:var(--muted);white-space:nowrap}
.slug-wrap input{border:none;box-shadow:none;background:transparent;padding-left:2px;font-family:var(--m)}
.author-pick{display:flex;align-items:center;gap:12px}
.author-pick .a{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e9eaed}
.author-pick .a svg{width:100%;height:100%;display:block}
.author-pick select{flex:1}
.cover-up{display:flex;gap:16px;align-items:center}
.cover-prev{width:180px;height:101px;border-radius:10px;overflow:hidden;position:relative;flex-shrink:0;background:var(--cover);border:1px solid var(--line-2)}
.cover-prev svg{position:absolute;inset:0;width:100%;height:100%}
.cover-up .upinfo .b{font-size:13px;font-weight:600;color:var(--ink)}
.cover-up .upinfo .s{font-size:11.5px;color:var(--muted);margin:4px 0 10px}
.blk{border:1px solid var(--line-2);border-radius:10px;padding:15px;margin-bottom:12px;background:var(--soft)}
.blk-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.blk-h .num{width:24px;height:24px;border-radius:6px;background:#fff;border:1px solid var(--line-2);color:var(--body);font-family:var(--m);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.blk-h .drag{color:var(--faint);cursor:grab}
.blk-h .lbl{font-family:var(--m);font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.blk-h .rm{margin-left:auto;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.blk-h .rm:hover{background:var(--red-soft);color:var(--red)}
.blk .mini-in{margin-bottom:10px}
.blk .mini-in:last-child{margin-bottom:0}
.add-blk{width:100%;border:1px dashed var(--line-2);border-radius:10px;padding:12px;color:var(--body);font-weight:600;font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.13s;background:#fff}
.add-blk:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.lesson-r{display:flex;align-items:center;gap:12px;border:1px solid var(--line-2);border-radius:10px;padding:11px 14px;margin-bottom:10px;background:#fff}
.lesson-r .drag{color:var(--faint);cursor:grab}
.lesson-r .num{font-family:var(--m);font-size:12px;font-weight:700;color:var(--muted);width:22px}
.lesson-r input.lt{flex:1;height:36px;border-color:var(--line-2)}
.lesson-r input.ld{width:90px;height:36px;border-color:var(--line-2);font-family:var(--m);font-size:12px;text-align:center}
.lesson-r .vid{font-family:var(--m);font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px;white-space:nowrap}
.lesson-r .rm{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.lesson-r .rm:hover{background:var(--red-soft);color:var(--red)}
.tagbox{border:1px solid var(--line-2);border-radius:var(--r-sm);padding:10px;background:#fff;display:flex;flex-wrap:wrap;gap:8px;align-items:center;min-height:46px}
.tagbox.focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
.tagc{display:inline-flex;align-items:center;gap:7px;background:var(--soft-2);border:1px solid var(--line-2);border-radius:7px;padding:5px 8px 5px 11px;font-size:13px;color:var(--ink)}
.tagc .x{color:var(--muted);cursor:pointer;display:flex}
.tagc .x:hover{color:var(--red)}
.tagbox input{border:none;box-shadow:none!important;background:transparent;flex:1;min-width:160px;height:30px;padding:0 4px}
.tagbox input:focus{outline:none}
.ck-list .ck{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ck-list .ck .ico{color:var(--red);flex-shrink:0}
.ck-list .ck input{flex:1;height:38px;border-color:var(--line-2)}
.ck-list .ck .rm{color:var(--muted);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ck-list .ck .rm:hover{background:var(--red-soft);color:var(--red)}
.serp{border:1px solid var(--line-2);border-radius:10px;padding:16px 18px;background:#fff}
.serp .url{font-family:var(--m);font-size:12px;color:#0b7a34;display:flex;align-items:center;gap:6px;margin-bottom:5px}
.serp .ttl{font-size:18px;color:#1a52c9;font-weight:500;line-height:1.3;margin-bottom:5px}
.serp .desc{font-size:13px;color:#4b4d55;line-height:1.5}
.seo-check{display:flex;flex-direction:column;gap:1px}
.seo-check .c{display:flex;align-items:center;gap:10px;padding:9px 0;font-size:13px;border-bottom:1px solid var(--line);color:var(--muted)}
.seo-check .c:last-child{border-bottom:none}
.seo-check .c .b{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.seo-check .c.ok .b{background:var(--green-soft);color:var(--green)}
.seo-check .c.no .b{background:var(--amber-soft);color:var(--amber)}
.seo-check .c.ok{color:var(--ink)}
.schema-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line-2);border-radius:10px;padding:13px 15px;background:var(--soft)}
.schema-card .ic{width:36px;height:36px;border-radius:9px;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.schema-card .nm{font-size:13.5px;font-weight:600;color:var(--ink)}
.schema-card .ds{font-size:11.5px;color:var(--muted)}
.schema-card .badge{margin-left:auto;font-family:var(--m);font-size:10px;font-weight:700;text-transform:uppercase;color:var(--green);background:var(--green-soft);padding:3px 8px;border-radius:5px}
.rel-pick{display:flex;align-items:center;gap:12px;border:1px solid var(--line-2);border-radius:10px;padding:10px 12px;margin-bottom:9px;background:#fff}
.rel-pick .cov{width:52px;height:33px;border-radius:6px;overflow:hidden;position:relative;flex-shrink:0;background:var(--cover);border:1px solid var(--line)}
.rel-pick .cov svg{position:absolute;inset:0;width:100%;height:100%}
.rel-pick .t{flex:1;font-size:13px;font-weight:600;min-width:0;color:var(--ink)}
.rel-pick .m{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px}
.rel-pick .rm{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.rel-pick .rm:hover{background:var(--red-soft);color:var(--red)}
.ed-rail{position:sticky;top:182px;display:flex;flex-direction:column;gap:16px}
.rc{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.rc h4{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:var(--ink)}
.status-sel{display:flex;flex-direction:column;gap:7px}
.status-opt{display:flex;align-items:center;gap:11px;padding:10px 12px;border:1px solid var(--line-2);border-radius:9px;cursor:pointer;transition:.12s}
.status-opt:hover{border-color:var(--muted)}
.status-opt.sel{border-color:var(--red);background:var(--red-soft)}
.status-opt .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-opt .dot.draft{background:var(--amber)}
.status-opt .dot.review{background:var(--blue)}
.status-opt .dot.pub{background:var(--green)}
.status-opt .t{font-size:13px;font-weight:600;color:var(--ink)}
.status-opt .d{font-size:11px;color:var(--muted)}
.status-opt .ck{margin-left:auto;color:var(--red);opacity:0}
.status-opt.sel .ck{opacity:1}
.gauge-wrap{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.gauge{width:72px;height:72px;flex-shrink:0;position:relative}
.gauge .v{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column}
.gauge .v b{font-size:20px;font-weight:800;line-height:1;color:var(--ink)}
.gauge .v span{font-size:9px;color:var(--muted);font-family:var(--m)}
.gscore-txt .lvl{font-size:14px;font-weight:700}
.gscore-txt .ds{font-size:11.5px;color:var(--muted);margin-top:2px}
.facts .f{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid var(--line);font-size:12.5px}
.facts .f:first-child{border-top:none}
.facts .f .k{color:var(--muted)}
.facts .f .v{font-weight:600;font-family:var(--m);font-size:11.5px;color:var(--ink)}
.auth-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.acard{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}
.acard .top{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.acard .av{width:54px;height:54px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#e9eaed}
.acard .av svg{width:100%;height:100%;display:block}
.acard .nm{font-size:15px;font-weight:700;color:var(--ink)}
.acard .rl{font-size:12.5px;color:var(--red)}
.acard .bio{font-size:12.5px;color:var(--body);line-height:1.5;margin-bottom:14px}
.acard .ft{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--line)}
.acard .ft .c{font-family:var(--m);font-size:11.5px;color:var(--muted)}
.media-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.mtile{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;transition:.14s;box-shadow:var(--shadow)}
.mtile:hover{border-color:var(--line-2);transform:translateY(-2px)}
.mtile .th{aspect-ratio:16/10;position:relative;overflow:hidden;background:var(--cover)}
.mtile .th svg.cover-svg{position:absolute;inset:0;width:100%;height:100%}
.mtile .th.photo{background:#e9eaed}
.mtile .th.photo svg{position:absolute;inset:0;width:100%;height:100%}
.mtile .th .ty{position:absolute;left:8px;top:8px;font-family:var(--m);font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:5px;color:#fff;z-index:2}
.mtile .th .pl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;z-index:2}
.mtile .th.doc{background:var(--soft);display:flex;align-items:center;justify-content:center;color:var(--muted)}
.mtile .mi{padding:10px 12px}
.mtile .mi .n{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.mtile .mi .s{font-family:var(--m);font-size:10.5px;color:var(--muted);margin-top:2px}
.up-tile{border:1px dashed var(--line-2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--body);font-weight:600;font-size:13px;min-height:150px;border-radius:10px;transition:.14s;cursor:pointer;background:#fff}
.up-tile:hover{border-color:var(--red);color:var(--red);background:var(--red-soft)}
.set-row{display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line-2);border-radius:10px;margin-bottom:10px;background:#fff}
.set-row .drag{color:var(--faint);cursor:grab}
.set-row .nm{flex:1;font-weight:600;font-size:13.5px;color:var(--ink)}
.set-row .cnt{font-family:var(--m);font-size:11.5px;color:var(--muted)}
.set-row .rm{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.set-row .rm:hover{background:var(--red-soft);color:var(--red)}
.page-head{margin-bottom:22px}
.page-head h2{font-size:22px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.page-head p{font-size:13.5px;color:var(--muted);margin-top:4px}
.modal-bg{position:fixed;inset:0;background:rgba(20,20,25,.35);backdrop-filter:blur(3px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px}
.modal{background:#fff;border:1px solid var(--line-2);border-radius:16px;width:100%;max-width:640px;padding:28px;box-shadow:0 30px 80px rgba(20,20,25,.25);position:relative}
.modal h3{font-size:19px;font-weight:800;letter-spacing:-.01em;color:var(--ink)}
.modal .ms{font-size:13.5px;color:var(--muted);margin:5px 0 22px}
.fmt-pick{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.fmt-pick .fp{border:1px solid var(--line-2);border-radius:12px;padding:18px 14px;text-align:center;cursor:pointer;transition:.14s}
.fmt-pick .fp:hover{border-color:var(--red);background:var(--red-soft)}
.fmt-pick .fp .ic{width:42px;height:42px;border-radius:11px;background:var(--soft-2);color:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto 11px}
.fmt-pick .fp h4{font-size:13.5px;font-weight:700;color:var(--ink)}
.fmt-pick .fp p{font-size:10.5px;color:var(--muted);margin-top:3px}
.modal-x{position:absolute;top:18px;right:18px}
@media(max-width:1000px){
  .app{grid-template-columns:1fr}.side{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}.panel-row{grid-template-columns:1fr}
  .qc,.fmt-pick{grid-template-columns:1fr 1fr}.auth-grid,.media-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>

  const titlePrev=m.title||'Заголовок материала';const descPrev=m.metaDesc||m.excerpt||'Описание появится в результатах поиска.';
  return `<div class="fcard"><h3>${svg(I.search,17)} Сниппет в поиске</h3><div class="hint">Так материал будет выглядеть в Яндексе и Google. Обновляется на лету.</div>
    <div class="serp"><div class="url">club.ctr.co.ru › ${FORMATS[m.format].plural.toLowerCase()} › <span id="spSlug">${m.slug||'…'}</span></div><div class="ttl" id="spTitle">${titlePrev}</div><div class="desc" id="spDesc">${descPrev}</div></div></div>
  <div class="fcard"><h3>Мета-теги</h3>
    <div class="field"><label>Title для поиска <span class="ct"><span id="mtC">${(m.title||'').length}</span>/70</span></label><input id="mtIn" value="${(m.title||'').replace(/"/g,'&quot;')}" placeholder="Обычно совпадает с заголовком" oninput="seoLive()"><div class="sub">Оптимально 50–70 символов с ключевым запросом ближе к началу.</div></div>
    <div class="field" style="margin:0"><label>Описание для поиска <span class="ct"><span id="mdC">${(m.metaDesc||'').length}</span>/160</span></label><textarea id="mdIn" rows="3" maxlength="200" placeholder="1–2 предложения с ключевым запросом" oninput="seoLive()">${m.metaDesc||''}</textarea><div class="sub" style="display:flex;justify-content:space-between"><span>Оптимально 120–160 символов.</span><button class="ai-btn" onclick="aiMeta()">✦ Сгенерировать из контента</button></div></div></div>
  <div class="fcard"><h3>Поисковые запросы</h3><div class="hint">Ключевые фразы, по которым материал должен находиться. Используются для перелинковки и блока «Поисковые запросы» на портале.</div>
    <div class="tagbox" id="kwBox" onclick="document.getElementById('kwIn').focus()"><span id="kwChips"></span><input id="kwIn" placeholder="Введите запрос и нажмите Enter" onkeydown="if(event.key==='Enter'){addKw(this.value);this.value=''}"></div>
    <div class="sub" style="display:flex;justify-content:space-between;margin-top:8px"><span>Например: «замена ступичного подшипника», «биение тормозного диска»</span><button class="ai-btn" onclick="aiKw()">✦ Подобрать запросы</button></div></div>
  <div class="fcard"><h3>Микроразметка Schema.org</h3><div class="hint">Определяется автоматически по формату материала. Передаётся в код как JSON-LD.</div>
    <div class="schema-card"><div class="ic">${svg(I.code,18)}</div><div><div class="nm">${FORMATS[m.format].schema}</div><div class="ds">${schemaDesc(m.format)}</div></div><span class="badge">Активна</span></div></div>`;
}
function schemaDesc(f){return{course:'Карточка курса + блок «Частые вопросы» в выдаче',webinar:'Видео в выдаче + блок «Частые вопросы»',workshop:'Видео и материалы + блок «Частые вопросы»',article:'Статья, «Коротко» под сниппет и «Частые вопросы»'}[f]}
function edRel(m){
  const rel=M.filter(x=>x.id!==m.id&&x.part===m.part).slice(0,3);
  const rel2=rel.length?rel:M.filter(x=>x.id!==m.id).slice(0,3);
  return `<div class="fcard"><h3>Похожие материалы</h3><div class="hint">Показываются в сайдбаре материала и усиливают внутреннюю перелинковку — важный фактор SEO.</div>
    ${rel2.map(r=>`<div class="rel-pick"><div class="cov">${coverSVG(r.part,r.format)}</div><div><div class="t">${r.title}</div><div class="m">${FORMATS[r.format].label}</div></div><button class="rm">${svg(I.x,15)}</button></div>`).join('')}
    <button class="add-blk" onclick="alert('Здесь откроется выбор материала из каталога.')">${svg(I.plus,16)} Добавить материал</button></div>
  <div class="fcard"><h3>Рекомендованный курс</h3><div class="hint">Для статей и вебинаров — основной курс, на который ведёт кнопка «К курсу».</div>
    <select><option>Не выбрано</option>${M.filter(x=>x.format==='course').map(c=>`<option ${c.part===m.part?'selected':''}>${c.title}</option>`).join('')}</select></div>`;
}
function editorRail(m){
  return `<div class="rc"><h4>Публикация</h4><div class="status-sel">${[['draft','Черновик','Виден только в админке'],['review','На проверке','Готов к ревью'],['published','Опубликовано','Виден на портале']].map(([k,t,d])=>`<div class="status-opt ${S.estatus===k?'sel':''}" onclick="setStatus('${k}')"><span class="dot ${k}"></span><div><div class="t">${t}</div><div class="d">${d}</div></div><span class="ck">${svg(I.check,16)}</span></div>`).join('')}</div>
    <button class="btn btn-primary" style="width:100%;margin-top:14px;justify-content:center">${S.estatus==='published'?'Обновить на портале':'Опубликовать'}</button></div>
  <div class="rc"><h4>SEO-оценка</h4><div class="gauge-wrap"><div class="gauge">${ringSVG(m.seo,72)}<div class="v"><b>${m.seo}</b><span>из 100</span></div></div>
    <div class="gscore-txt"><div class="lvl" style="color:${m.seo>=80?'var(--green)':m.seo>=60?'var(--amber)':'var(--red)'}">${m.seo>=80?'Отлично':m.seo>=60?'Можно лучше':'Требует доработки'}</div><div class="ds">Заполните блок SEO, чтобы поднять оценку</div></div></div>
    <div class="seo-check">${seoChecklist(m)}</div></div>
  <div class="rc"><h4>Сводка</h4><div class="facts">
    <div class="f"><span class="k">Формат</span><span class="v">${FORMATS[m.format].label}</span></div>
    <div class="f"><span class="k">Автор</span><span class="v" style="font-family:var(--f);font-size:12.5px">${m.author}</span></div>
    ${m.id?`<div class="f"><span class="k">Просмотры</span><span class="v">${m.views.toLocaleString('ru')}</span></div><div class="f"><span class="k">Изменён</span><span class="v" style="font-family:var(--f);font-size:12.5px">${m.updated}</span></div>`:''}
  </div></div>`;
}
function seoChecklist(m){
  const checks=[[m.title.length>0&&m.title.length<=70,'Заголовок ≤ 70 символов'],[(m.metaDesc||'').length>=80,'Описание для поиска'],[m.keywords.length>=3,'≥ 3 поисковых запроса'],[!!m.slug,'Человекочитаемый URL'],[true,'Schema.org подключена']];
  return checks.map(([ok,t])=>`<div class="c ${ok?'ok':'no'}"><span class="b">${ok?svg(I.check,13):svg(I.plus,13)}</span>${t}</div>`).join('');
}
function setStatus(s){S.estatus=s;render()}
function liveTitle(v){const t=document.getElementById('spTitle');if(t)t.textContent=v||'Заголовок материала';const sl=document.getElementById('slugIn');if(sl&&!sl.dataset.touched){sl.value=translit(v);const sp=document.getElementById('spSlug');if(sp)sp.textContent=sl.value||'…'}}
function seoLive(){const t=document.getElementById('mtIn'),d=document.getElementById('mdIn');if(t){document.getElementById('mtC').textContent=t.value.length;const sp=document.getElementById('spTitle');if(sp)sp.textContent=t.value||'Заголовок материала'}if(d){document.getElementById('mdC').textContent=d.value.length;const sp=document.getElementById('spDesc');if(sp)sp.textContent=d.value||'Описание появится в результатах поиска.'}}
function translit(s){const map={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'e',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'c',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya',' ':'-'};return (s||'').toLowerCase().split('').map(c=>map[c]!==undefined?map[c]:/[a-z0-9-]/.test(c)?c:'').join('').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,50)}
function renderKw(){const c=document.getElementById('kwChips');if(!c)return;c.innerHTML=S.ek.map((k,i)=>`<span class="tagc">${k} <span class="x" onclick="rmKw(${i})">${svg(I.x,12)}</span></span>`).join('')}
function addKw(v){v=(v||'').trim();if(v&&!S.ek.includes(v)){S.ek.push(v);renderKw()}}
function rmKw(i){S.ek.splice(i,1);renderKw()}
function aiFill(btn,kind){btn.disabled=true;const old=btn.innerHTML;btn.innerHTML='✦ Генерирую…';setTimeout(()=>{const ta=btn.closest('.field').querySelector('textarea');const s={excerpt:'Диагностика гула, выпрессовка и запрессовка без перекоса, момент затяжки ступичной гайки — полный цикл замены на реальном автомобиле.',intro:'Гул ступичного подшипника — частая причина обращения и повторного визита. В курсе эксперт CTR разбирает полный цикл: от диагностики до контроля момента затяжки.'};if(ta){ta.value=s[kind]||'';ta.dispatchEvent(new Event('input'))}btn.disabled=false;btn.innerHTML=old},700)}
function aiMeta(){const d=document.getElementById('mdIn');d.value='Как заменить ступичный подшипник: диагностика гула, выпрессовка и запрессовка без перекоса, момент затяжки ступичной гайки. Видеокурс эксперта CTR.';seoLive()}
function aiKw(){['замена ступичного подшипника','гудит ступичный подшипник','момент затяжки ступичной гайки','диагностика ступицы'].forEach(addKw)}
function vAuthors(){
  return topbar('Авторы',false)+`<div class="content">
    <div class="page-head" style="display:flex;justify-content:space-between;align-items:flex-end"><div><h2>Авторы и эксперты</h2><p>Указываются в каждом материале. Профиль эксперта усиливает доверие и E-E-A-T для поиска.</p></div><button class="btn btn-primary btn-sm">${svg(I.plus,16)} Добавить автора</button></div>
    <div class="auth-grid">${AUTHORS.map(a=>`<div class="acard"><div class="top"><div class="av">${avatarSVG(a.n)}</div><div><div class="nm">${a.n}</div><div class="rl">${a.r}</div></div></div><div class="bio">${a.bio}</div><div class="ft"><span class="c">${a.c} материалов</span><button class="btn btn-ghost btn-sm">${svg(I.edit,14)} Профиль</button></div></div>`).join('')}</div></div>`;
}
function vMedia(){
  return topbar('Медиатека',false)+`<div class="content">
    <div class="page-head"><h2>Медиатека</h2><p>Обложки, видео, фото авторов и файлы. Используются при заполнении материалов.</p></div>
    <div class="toolbar"><select class="sel"><option>Все типы</option><option>Обложки</option><option>Видео</option><option>Фото авторов</option><option>Документы</option></select><div class="spacer"></div><button class="btn btn-primary btn-sm">${svg(I.plus,16)} Загрузить</button></div>
    <div class="media-grid">
      <div class="up-tile">${svg(I.plus,22)}<span>Загрузить файл</span></div>
      ${MEDIA.map(f=>{
        let th;
        if(f.kind==='cover')th=`<div class="th">${coverSVG(f.part,'')}<span class="ty">обложка</span></div>`;
        else if(f.kind==='video')th=`<div class="th">${coverSVG(f.part,'')}<span class="ty">видео</span><span class="pl">${svg(I.play,26)}</span></div>`;
        else if(f.kind==='photo')th=`<div class="th photo">${avatarSVG(f.author)}<span class="ty">фото</span></div>`;
        else th=`<div class="th doc"><span class="ty" style="color:#fff">pdf</span>${svg(I.doc,30)}</div>`;
        return `<div class="mtile">${th}<div class="mi"><div class="n">${f.n}</div><div class="s">${f.s}</div></div></div>`;
      }).join('')}
    </div></div>`;
}
function vSeo(){
  const rows=[['замена ступичного подшипника','1','2 800','↑'],['тормозные диски точить или менять','2','2 100','↑'],['как запрессовать сайлентблок','3','1 940','='],['гудит ступичный подшипник','5','3 200','↑'],['биение тормозного диска','7','1 120','↑'],['подбор подвески по vin','9','880','↓'],['стук в передней подвеске','11','1 350','↑'],['замена шруса','6','1 010','=']];
  return topbar('Поисковые запросы',false)+`<div class="content">
    <div class="page-head"><h2>Поисковые позиции</h2><p>Данные из Яндекс.Вебмастера и Search Console. Где портал уже находится — и где можно усилиться.</p></div>
    <div class="stat-grid"><div class="stat"><div class="num">128</div><div class="lbl">Запросов в топ-10</div></div><div class="stat"><div class="num">5.4</div><div class="lbl">Средняя позиция</div></div><div class="stat"><div class="num">42</div><div class="lbl">Проиндексировано страниц</div></div><div class="stat"><div class="num">31.2к</div><div class="lbl">Переходов из поиска / мес</div></div></div>
    <div class="tbl" style="margin-top:6px"><div class="tbl-h" style="grid-template-columns:2.5fr 1fr 1fr 1.2fr 1.2fr"><div>Запрос</div><div>Позиция</div><div>Показы</div><div>Динамика</div><div>Страница</div></div>
      ${rows.map(([q,p,sh,dyn])=>`<div class="tbl-r" style="grid-template-columns:2.5fr 1fr 1fr 1.2fr 1.2fr;cursor:default"><div class="tr-cell" style="color:var(--ink);font-weight:600;white-space:normal">${q}</div><div><span class="pos" style="display:inline-flex;width:30px;height:30px;border-radius:8px;align-items:center;justify-content:center;font-family:var(--m);font-weight:700;font-size:13px;background:${+p>5?'var(--amber-soft)':'var(--green-soft)'};color:${+p>5?'var(--amber)':'var(--green)'}">${p}</span></div><div class="tr-cell mono" style="font-family:var(--m);font-size:12px;color:var(--muted)">${sh}</div><div class="tr-cell" style="font-family:var(--m);font-size:12px;color:${dyn==='↑'?'var(--green)':dyn==='↓'?'var(--red)':'var(--muted)'}">${dyn} ${dyn==='↑'?'рост':dyn==='↓'?'спад':'стабильно'}</div><div class="tr-cell" style="font-family:var(--m);font-size:12px;color:var(--blue)">/материал</div></div>`).join('')}
    </div></div>`;
}
function vSettings(){
  return topbar('Настройки',false)+`<div class="content" style="max-width:760px">
    <div class="page-head"><h2>Настройки портала</h2><p>Базовые параметры. Меняются редко.</p></div>
    <div class="fcard" style="margin-bottom:20px"><h3>Форматы контента</h3><div class="hint">Доступные типы материалов. Соответствуют разделам портала. Портал технический — рубрики не используются.</div>
      ${FORDER.map(f=>`<div class="set-row"><span class="drag">${svg(I.drag,16)}</span><span class="nm" style="display:flex;align-items:center;gap:10px">${svg(FORMATS[f].icon,16)} ${FORMATS[f].plural}</span><span class="cnt">${M.filter(m=>m.format===f).length} · ${FORMATS[f].schema}</span></div>`).join('')}
    </div>
    <div class="fcard"><h3>Название портала</h3><div class="row2"><div class="field" style="margin:0"><label>Заголовок в шапке</label><input value="CTR CLUB · Обучение"></div><div class="field" style="margin:0"><label>Домен</label><input value="club.ctr.co.ru" class="mono"></div></div></div>
  </div>`;
}
function openCreate(){
  const el=document.createElement('div');el.className='modal-bg';el.id='modal';el.onclick=e=>{if(e.target===el)closeModal()};
  el.innerHTML=`<div class="modal"><button class="modal-x icon-btn" onclick="closeModal()">${svg(I.x,16)}</button><h3>Новый материал</h3><div class="ms">Выберите формат — дальше откроется редактор с нужными полями.</div>
    <div class="fmt-pick">${FORDER.map(f=>`<div class="fp" onclick="closeModal();go('editor',null,'${f}')"><div class="ic">${svg(FORMATS[f].icon,20)}</div><h4>${FORMATS[f].label}</h4><p>${f==='course'?'Из уроков':f==='article'?'Текст':'Видео'}</p></div>`).join('')}</div></div>`;
  document.body.appendChild(el);
}
function closeModal(){const el=document.getElementById('modal');if(el)el.remove()}
function render(){
  renderNav();
  let h='';
  switch(S.view){case 'dashboard':h=vDashboard();break;case 'list':h=vList();break;case 'editor':h=vEditor();break;case 'authors':h=vAuthors();break;case 'media':h=vMedia();break;case 'seo':h=vSeo();break;case 'settings':h=vSettings();break;default:h=vDashboard()}
  document.getElementById('app').innerHTML=h;
  if(S.view==='editor'&&S.etab==='seo')renderKw();
}
render();
</script>
</body>
</html>
